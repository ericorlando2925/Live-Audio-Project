<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Audio Feed</title>
</head>
<body>

    <h1>My Live Audio Project</h1>
    
    <!-- The button to trigger the process -->
    <button id="live-mic-btn">Start Microphone</button>
    
    <!-- The status display -->
    <p id="log">Status: Waiting for interaction...</p>

    <script>
        document.getElementById('live-mic-btn').addEventListener('click', async () => {
            const log = document.getElementById('log');
            log.innerText = "Status: Requesting permission...";

            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                log.innerText = "Status: Microphone connected!";
                console.log("Audio stream captured:", stream);
                
            } catch (err) {
                log.innerText = "Status: Access denied or error.";
                console.error("Error:", err);
            }
        });
    </script>
</body>
</html>
