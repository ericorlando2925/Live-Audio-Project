<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Audio & Speech Decoder</title>
</head>
<body>

    <h1>My Live Audio Project</h1>
    
    <button id="live-mic-btn">Start Microphone</button>
    <!-- New Clear Button -->
    <button id="clear-btn">Clear Text</button>
    
    <p id="log">Status: Waiting for interaction...</p>
    
    <h3>Transcription:</h3>
    <div id="output" style="border: 1px solid #ccc; padding: 10px; min-height: 50px; background: #f9f9f9;"></div>

    <script>
        const log = document.getElementById('log');
        const output = document.getElementById('output');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.continuous = true;
        recognition.interimResults = false; 

        // Update to append text
        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    output.innerText += " " + event.results[i][0].transcript;
                }
            }
        };

        // Start Microphone Logic
        document.getElementById('live-mic-btn').addEventListener('click', async () => {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                log.innerText = "Status: Listening...";
                recognition.start();
            } catch (err) {
                log.innerText = "Status: Access denied or error.";
            }
        });

        // New Clear Logic
        document.getElementById('clear-btn').addEventListener('click', () => {
            output.innerText = "";
        });
    </script>
</body>
</html>
